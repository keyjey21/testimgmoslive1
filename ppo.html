<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тест ППО | Москва ЛАЙВ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: radial-gradient(ellipse at 20% 30%, #0a0a2a, #050510); min-height: 100vh; color: #fff; }
    .neon-glow { text-shadow: 0 0 5px #ff00d4, 0 0 10px #ff00d4, 0 0 20px #ff00d4; }
    .btn-neon {
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #ff00d4;
      color: #ff00d4;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    .btn-neon:hover { background: #ff00d4; color: #050510; box-shadow: 0 0 30px #ff00d4; transform: scale(1.02); }
    .btn-neon-green { border-color: #00ff88; color: #00ff88; }
    .btn-neon-green:hover { background: #00ff88; box-shadow: 0 0 30px #00ff88; }
    .btn-neon-secondary { border-color: #00d4ff; color: #00d4ff; }
    .btn-neon-secondary:hover { background: #00d4ff; box-shadow: 0 0 30px #00d4ff; }
    .glass-card { background: rgba(20, 20, 50, 0.4); backdrop-filter: blur(12px); border-radius: 24px; border: 1px solid rgba(255, 0, 212, 0.3); padding: 24px; }
    .question-block { background: rgba(20, 20, 50, 0.6); border-radius: 20px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #ff00d4; }
    .timer-box { font-size: 32px; font-weight: bold; text-align: center; padding: 16px; background: rgba(0,0,0,0.5); border-radius: 60px; margin-bottom: 24px; border: 1px solid #ff00d4; color: #ff00d4; }
    .result { text-align: center; padding: 20px; border-radius: 20px; margin-top: 20px; font-weight: bold; }
    .correct { background: rgba(0, 255, 136, 0.2); color: #00ff88; border: 1px solid #00ff88; }
    .wrong { background: rgba(255, 0, 212, 0.2); color: #ff00d4; border: 1px solid #ff00d4; }
    textarea { width: 100%; padding: 12px; border-radius: 12px; background: rgba(0,0,0,0.5); border: 1px solid #ff00d4; color: white; margin-top: 12px; }
    textarea:focus { outline: none; box-shadow: 0 0 15px #ff00d4; }
    input[type="radio"] { accent-color: #ff00d4; margin-right: 8px; }
    .hidden { display: none; }
    .table-link {
      display: inline-block;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #ff00d4;
      color: #ff00d4;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }
    .table-link:hover {
      background: #ff00d4;
      color: #050510;
      box-shadow: 0 0 15px #ff00d4;
    }
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 20px;
    }
    .nav-buttons button {
      flex: 1;
      padding: 12px 20px;
    }
    .question-counter {
      text-align: center;
      margin-bottom: 16px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="glass-card max-w-2xl mx-auto mt-12 p-6">
  <div class="text-center mb-6">
    <h1 class="text-4xl font-extrabold neon-glow">📋 ТЕСТ ППО</h1>
    <p class="text-gray-400 mt-2">Правила публикации объявлений</p>
    <div class="mt-3">
      <a href="https://www.table-ppo.ru/" target="_blank" class="table-link">
        📖 Официальная таблица ППО
      </a>
    </div>
  </div>

  <div id="step1">
    <input type="text" id="username" placeholder="Имя и фамилия" class="w-full p-3 rounded-xl bg-black/50 border border-pink-500 text-white text-center mb-4">
    <button class="btn-neon w-full" id="startBtn">▶ НАЧАТЬ ТЕСТ</button>
  </div>

  <div id="step2" class="hidden">
    <div class="timer-box" id="timerDisplay">30:00</div>
    <div class="question-counter" id="questionCounter">Вопрос 1 из 0</div>
    <div id="currentQuestion"></div>
    <div class="nav-buttons">
      <button id="prevBtn" class="btn-neon btn-neon-secondary" disabled>◀ НАЗАД</button>
      <button id="nextBtn" class="btn-neon btn-neon-secondary">ДАЛЕЕ ▶</button>
    </div>
    <button class="btn-neon btn-neon-green w-full mt-6" id="checkBtn">✅ ЗАВЕРШИТЬ И ПРОВЕРИТЬ</button>
    <div id="resultArea"></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCuOIt7wMUrN8vu9RQqivNj9w3CdFitrqE",
  authDomain: "moscow-live-tests.firebaseapp.com",
  projectId: "moscow-live-tests",
  storageBucket: "moscow-live-tests.firebasestorage.app",
  messagingSenderId: "956332293918",
  appId: "1:956332293918:web:e7f66986cca2a30474130f"
};

const TELEGRAM_TOKEN = "7611996960:AAH7uARRG4FS8aM0M5xcK25PMagBOvnSjbQ";
const TELEGRAM_CHAT_ID = "5755169925";
const OTHER_CHATS = ["1360982536", "5329733389", "1880536475", "1302624133", "5337802253", "902249172", "8038255042"];

let db = null, allQuestions = [], selected = [], userAnswers = {}, timerInterval = null, timeLeft = 1800, testActive = false;
let currentQuestionIndex = 0;

// Подтверждение выхода из теста
window.addEventListener('beforeunload', function(e) {
  if (testActive) {
    e.preventDefault();
    e.returnValue = 'Вы не завершили тест! Вы уверены, что хотите уйти?';
    return e.returnValue;
  }
});

firebase.initializeApp(firebaseConfig);
db = firebase.database();

async function loadQuestions() {
  const mc = await db.ref('questions/ppoQuestions').once('value');
  const wr = await db.ref('questions/ppoWrittenQuestions').once('value');
  let mcQ = mc.exists() ? mc.val() : [];
  let wrQ = wr.exists() ? wr.val() : [];
  mcQ = mcQ.filter(q => q.inTest !== false);
  wrQ = wrQ.filter(q => q.inTest !== false);
  allQuestions = [...mcQ, ...wrQ];
  return allQuestions.length;
}

function shuffle(arr) { for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

async function startTest() {
  const username = document.getElementById('username').value.trim();
  if(!username) { alert('Введите имя!'); return; }
  const cnt = await loadQuestions();
  if(cnt === 0) { alert('Нет вопросов!'); return; }
  selected = shuffle([...allQuestions]);
  userAnswers = {};
  testActive = true;
  timeLeft = 1800;
  currentQuestionIndex = 0;
  renderCurrentQuestion();
  startTimer();
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
}

function renderCurrentQuestion() {
  const container = document.getElementById('currentQuestion');
  const counter = document.getElementById('questionCounter');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  
  counter.innerHTML = `Вопрос ${currentQuestionIndex + 1} из ${selected.length}`;
  prevBtn.disabled = (currentQuestionIndex === 0);
  nextBtn.textContent = (currentQuestionIndex === selected.length - 1) ? 'ПОСЛЕДНИЙ ▶' : 'ДАЛЕЕ ▶';
  
  const q = selected[currentQuestionIndex];
  const savedAnswer = userAnswers[currentQuestionIndex] || '';
  
  let inner = `<div class="question-block" id="q-${currentQuestionIndex}">
    <div class="font-bold text-lg mb-3">${currentQuestionIndex + 1}. ${escapeHtml(q.q)}</div>`;
  
  if(q.options && q.options.length) {
    inner += q.options.map(opt => `
      <label class="flex items-center gap-2 p-2 rounded-lg hover:bg-white/5 cursor-pointer">
        <input type="radio" name="currentQ" value="${escapeHtml(opt)}" ${savedAnswer === opt ? 'checked' : ''}> ${escapeHtml(opt)}
      </label>
    `).join('');
  } else {
    inner += `<textarea name="currentQ" rows="3" placeholder="Введите ответ..." class="w-full p-2 border rounded dark:bg-gray-700">${escapeHtml(savedAnswer)}</textarea>`;
  }
  
  inner += `<div class="answer-hint hidden mt-3 pt-2 border-t border-pink-500/30 text-sm" id="hint-${currentQuestionIndex}"></div></div>`;
  container.innerHTML = inner;
  
  // Сохраняем ответ при изменении
  const radios = document.querySelectorAll('input[name="currentQ"]');
  const textarea = document.querySelector('textarea[name="currentQ"]');
  
  if(radios.length) {
    radios.forEach(r => {
      r.addEventListener('change', () => {
        userAnswers[currentQuestionIndex] = r.value;
      });
    });
  } else if(textarea) {
    textarea.addEventListener('input', () => {
      userAnswers[currentQuestionIndex] = textarea.value;
    });
  }
}

function nextQuestion() {
  if(currentQuestionIndex < selected.length - 1) {
    currentQuestionIndex++;
    renderCurrentQuestion();
  }
}

function prevQuestion() {
  if(currentQuestionIndex > 0) {
    currentQuestionIndex--;
    renderCurrentQuestion();
  }
}

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    if(!testActive) return;
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft <= 0) { clearInterval(timerInterval); alert('Время вышло!'); checkAnswers(); }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

function checkAnswers() {
  if(!testActive) return;
  testActive = false;
  clearInterval(timerInterval);
  const username = document.getElementById('username').value.trim();
  
  let correctCount = 0;
  for(let i=0; i<selected.length; i++) {
    const q = selected[i];
    const userAnswer = userAnswers[i] || '';
    let isCorrect = false;
    if(q.options && q.options.length) isCorrect = (userAnswer === q.answer);
    else isCorrect = userAnswer.trim().toLowerCase() === (q.answer || '').trim().toLowerCase();
    if(isCorrect) correctCount++;
  }
  
  // Показываем результаты со всеми правильными ответами
  const container = document.getElementById('currentQuestion');
  let resultsHtml = '';
  for(let i=0; i<selected.length; i++) {
    const q = selected[i];
    const userAnswer = userAnswers[i] || '';
    let isCorrect = false;
    if(q.options && q.options.length) isCorrect = (userAnswer === q.answer);
    else isCorrect = userAnswer.trim().toLowerCase() === (q.answer || '').trim().toLowerCase();
    
    resultsHtml += `
      <div class="question-block">
        <div class="font-bold text-lg mb-2">${i+1}. ${escapeHtml(q.q)}</div>
        <div class="text-sm mb-1">Ваш ответ: ${escapeHtml(userAnswer) || '(не выбран)'}</div>
        <div class="text-sm ${isCorrect ? 'text-green-400' : 'text-red-400'}">
          ${isCorrect ? '✅' : '❌'} Правильный ответ: ${escapeHtml(q.answer)}
        </div>
      </div>
    `;
  }
  
  const pass = Math.floor(selected.length * 0.7);
  resultsHtml = `<div class="result ${correctCount >= pass ? 'correct' : 'wrong'} mb-4">
    📊 Результат: ${correctCount} / ${selected.length}<br>
    ${correctCount >= pass ? '✅ СДАЛ! Молодец!' : '❌ НЕ СДАЛ! Иди учить ППО!'}
  </div>` + resultsHtml;
  
  container.innerHTML = resultsHtml;
  document.querySelector('.nav-buttons').style.display = 'none';
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('questionCounter').innerHTML = '📋 РЕЗУЛЬТАТЫ ТЕСТА';
  
  sendToTelegram(`📝 <b>Тест ППО</b>\n👤 ${username}\n📊 ${correctCount}/${selected.length}\n${correctCount >= pass ? "✅ СДАЛ" : "❌ НЕ СДАЛ"}`);
}

async function sendToTelegram(msg) {
  const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
  try {
    await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg, parse_mode: "HTML" }) });
    for(let id of OTHER_CHATS) fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ chat_id: id, text: msg, parse_mode: "HTML" }) });
  } catch(e) {}
}

function escapeHtml(t) { return t ? t.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])) : ''; }

document.getElementById('startBtn').onclick = startTest;
document.getElementById('nextBtn').onclick = nextQuestion;
document.getElementById('prevBtn').onclick = prevQuestion;
document.getElementById('checkBtn').onclick = checkAnswers;
</script>
</body>
</html>
