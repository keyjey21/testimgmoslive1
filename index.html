<!DOCTYPE html>
<html lang="ru" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>МОСКВА ЛАЙВ — Тест</title>
  <meta name="description" content="Тестирование сотрудников ВГТРК Москва-Лайв" />
  <meta name="theme-color" content="#3b82f6" />
  <link rel="preconnect" href="https://cdn.tailwindcss.com" />
  <link rel="preconnect" href="https://www.gstatic.com" />
  <link rel="preconnect" href="https://moscow-live-tests-default-rtdb.firebaseio.com" />
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    /* Минимальные критические стили для быстрого отображения */
    body { margin: 0; background: #d9e8ff; transition: background 0.3s, color 0.3s; }
    html.dark body { background: #0a2540; }
    .admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
    .admin-modal.active { display: flex; }
    .admin-modal-content { background: #d9e8ff; border-radius: 16px; padding: 2rem; max-width: 400px; width: 90%; text-align: center; }
    html.dark .admin-modal-content { background: #1f2937; color: white; }
    .logo-clickable { cursor: pointer; transition: transform 0.2s ease; }
    .logo-clickable:active { transform: scale(0.98); }
    .loading-settings { text-align: center; padding: 20px; color: #666; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 30px; height: 30px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
  </style>
</head>
<body>
  <div class="absolute top-4 right-4 z-50"><button onclick="toggleTheme()" class="text-2xl p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition" id="theme-icon">🌙</button></div>
  <div class="min-h-screen flex flex-col items-center justify-center p-4 md:p-6">
    <img src="logo.png" class="w-32 md:w-48 mb-6 drop-shadow-lg rounded-xl logo-clickable" onclick="onLogoClick()" alt="Логотип Москва Лайв" loading="lazy" />
    <h1 class="text-3xl md:text-4xl font-bold text-center mb-2">Тест МОСКВА ЛАЙВ</h1>
    <p class="text-center text-base md:text-lg mb-6 text-gray-600 dark:text-gray-400">Выберите тест:</p>
    <div id="testButtonsContainer" class="flex flex-col gap-4 w-full max-w-sm"><div class="loading-settings"><div class="spinner"></div>Загрузка...</div></div>
    <button onclick="sendSuggestion()" class="mt-6 bg-orange-600 hover:bg-orange-700 text-white py-3 rounded-xl text-center font-semibold shadow transition w-full max-w-sm">💡 Предложения или ошибки</button>
  </div>
  <div id="adminModal" class="admin-modal" onclick="if(event.target===this) closeAdminModal()"><div class="admin-modal-content"><h2 class="text-xl font-bold mb-4">🔐 Вход в админ-панель</h2><input type="password" id="adminPassword" placeholder="Пароль" class="w-full p-2 rounded border"><button onclick="checkAdminPassword()" class="mt-2 bg-blue-600 text-white px-4 py-2 rounded">Войти</button><button onclick="closeAdminModal()" class="mt-2 ml-2 bg-gray-500 text-white px-4 py-2 rounded">Отмена</button><div id="adminError" class="text-red-500 text-sm mt-2"></div></div></div>

<script>
// Оптимизированная версия с кешированием
const FIREBASE_CONFIG = { apiKey: "AIzaSyCuOIt7wMUrN8vu9RQqivNj9w3CdFitrqE", authDomain: "moscow-live-tests.firebaseapp.com", projectId: "moscow-live-tests", storageBucket: "moscow-live-tests.firebasestorage.app", messagingSenderId: "956332293918", appId: "1:956332293918:web:e7f66986cca2a30474130f" };
let clickCount = 0, clickTimer = null, db = null, cachedVisibility = null;

function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
function toggleTheme() { const h = document.documentElement; h.classList.toggle('dark'); h.classList.toggle('light'); localStorage.setItem('theme', h.classList.contains('dark') ? 'dark' : 'light'); document.getElementById('theme-icon').textContent = h.classList.contains('dark') ? '☀️' : '🌙'; }
(function() { const s = localStorage.getItem('theme'); const h = document.documentElement; if (s === 'dark') { h.classList.add('dark'); h.classList.remove('light'); } else { h.classList.add('light'); h.classList.remove('dark'); } document.getElementById('theme-icon').textContent = s === 'dark' ? '☀️' : '🌙'; })();

function initFirebase() { if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG); db = firebase.database(); loadVisibility(); }
async function loadVisibility() {
  const cached = localStorage.getItem('testVisibilityCache');
  const cacheTime = localStorage.getItem('testVisibilityCacheTime');
  if (cached && cacheTime && Date.now() - parseInt(cacheTime) < 300000) { renderVisibleTests(JSON.parse(cached)); }
  try { const s = await db.ref('settings/testVisibility').once('value'); if (s.exists()) { const v = s.val(); localStorage.setItem('testVisibilityCache', JSON.stringify(v)); localStorage.setItem('testVisibilityCacheTime', Date.now().toString()); renderVisibleTests(v); } else { renderVisibleTests({ ppo: true, ustav: true, leadership: true }); } } catch(e) { renderVisibleTests({ ppo: true, ustav: true, leadership: true }); }
  db.ref('settings/testVisibility').on('value', (s) => { if (s.exists()) { const v = s.val(); localStorage.setItem('testVisibilityCache', JSON.stringify(v)); renderVisibleTests(v); } });
}
function renderVisibleTests(v) {
  const vis = v || { ppo: true, ustav: true, leadership: true };
  const c = document.getElementById('testButtonsContainer'); if (!c) return;
  c.innerHTML = '';
  const tests = [{ id: 'ustav', name: '📜 Тест по Уставу', color: 'blue', url: 'ustav.html' }, { id: 'ppo', name: '📋 Тест по ППО', color: 'purple', url: 'ppo.html' }, { id: 'leadership', name: '👔 Тест по Руководству', color: 'green', url: 'leadership.html' }];
  let cnt = 0;
  tests.forEach(t => { if (vis[t.id]) { cnt++; const btn = document.createElement('a'); btn.href = t.url; btn.className = `bg-${t.color}-600 text-white py-3 rounded-xl text-center font-semibold shadow hover:bg-${t.color}-700 transition`; btn.textContent = t.name; c.appendChild(btn); } });
  if (cnt === 0) c.innerHTML = '<p class="text-center text-gray-500 py-8">⚠️ Все тесты скрыты. Зайдите в админ-панель.</p>';
}
function onLogoClick() { clickCount++; if (clickTimer) clearTimeout(clickTimer); clickTimer = setTimeout(() => clickCount = 0, 800); if (clickCount === 3) { clickCount = 0; document.getElementById('adminModal').classList.add('active'); } }
function checkAdminPassword() { if (document.getElementById('adminPassword').value === "admin2024") { window.location.href = "admin.html"; } else { document.getElementById('adminError').textContent = "Неверный пароль!"; } }
function closeAdminModal() { document.getElementById('adminModal').classList.remove('active'); document.getElementById('adminPassword').value = ''; document.getElementById('adminError').textContent = ''; }
function sendSuggestion() { const s = prompt("Ваше предложение или ошибка:"); if (s) alert("Спасибо!"); }
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeAdminModal(); });
document.addEventListener('DOMContentLoaded', () => { initFirebase(); });
</script>
</body>
</html>
