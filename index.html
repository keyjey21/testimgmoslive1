<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Москва Лайв | Тесты</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 20% 30%, #0a0a2a, #050510);
      min-height: 100vh;
      color: #fff;
    }
    .neon-glow {
      text-shadow: 0 0 5px #00d4ff, 0 0 10px #00d4ff, 0 0 20px #00d4ff;
    }
    .test-card {
      background: rgba(15, 15, 35, 0.6);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid rgba(0, 212, 255, 0.3);
      width: 260px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .test-card:hover {
      transform: translateY(-8px);
      border-color: #00d4ff;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
    }
    .test-card.pink:hover {
      border-color: #ff00d4;
      box-shadow: 0 0 30px rgba(255, 0, 212, 0.3);
    }
    .test-card.green:hover {
      border-color: #00ff88;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
    }
    .test-icon { font-size: 52px; margin-bottom: 16px; }
    .test-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; white-space: nowrap; }
    .test-desc { font-size: 12px; color: #aaa; line-height: 1.4; max-width: 200px; }
    .suggestion-btn {
      background: linear-gradient(135deg, #ff00d4, #00d4ff);
      border: none;
      color: white;
      padding: 14px 32px;
      border-radius: 60px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
      margin-top: 40px;
    }
    .suggestion-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.8);
    }
    .logo {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #00d4ff, #ff00d4);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin: 0 auto 20px;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    }
    .admin-icon {
      position: fixed;
      top: 15px;
      left: 15px;
      width: 32px;
      height: 32px;
      background: rgba(0, 212, 255, 0.1);
      backdrop-filter: blur(5px);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(0, 212, 255, 0.2);
      color: rgba(0, 212, 255, 0.5);
      z-index: 200;
    }
    .admin-icon:hover {
      background: rgba(0, 212, 255, 0.2);
      border-color: rgba(0, 212, 255, 0.5);
      color: rgba(0, 212, 255, 0.8);
      transform: scale(1.05);
    }
    .admin-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .admin-modal.active { display: flex; }
    .admin-modal-content {
      background: rgba(10, 10, 30, 0.95);
      border-radius: 32px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      border: 2px solid #00d4ff;
      box-shadow: 0 0 50px rgba(0, 212, 255, 0.3);
    }
    .admin-modal-content input {
      width: 100%;
      padding: 14px;
      margin: 15px 0;
      border-radius: 60px;
      border: 2px solid #00d4ff;
      background: rgba(0, 0, 0, 0.6);
      color: #00d4ff;
      font-size: 18px;
      text-align: center;
      outline: none;
    }
    .admin-modal-content input:focus { box-shadow: 0 0 20px #00d4ff; }
    .tests-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 28px;
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
    }
    @media (max-width: 800px) {
      .tests-container { gap: 20px; }
      .test-card { width: 220px; min-height: 200px; padding: 20px 16px; }
      .test-icon { font-size: 44px; }
      .test-title { font-size: 18px; white-space: normal; }
    }
    @media (max-width: 600px) {
      .tests-container { gap: 16px; flex-direction: column; align-items: center; }
      .test-card { width: 260px; min-height: 200px; }
      .test-icon { font-size: 40px; }
      .logo { width: 70px; height: 70px; font-size: 34px; }
      .main-title h1 { font-size: 32px; }
      .main-title p { font-size: 14px; }
    }
    .main-title {
      text-align: center;
      margin-bottom: 20px;
    }
    .main-title h1 { font-size: 48px; font-weight: 800; }
    .main-title p { font-size: 16px; color: #aaa; margin-top: 8px; }
    .footer-btn { text-align: center; margin-top: 50px; }
  </style>
</head>
<body>

<div class="admin-icon" onclick="onAdminIconClick()">🔧</div>

<div class="min-h-screen flex flex-col items-center justify-center p-6">
  <div class="logo">🎮</div>
  <div class="main-title">
    <h1 class="neon-glow">МОСКВА ЛАЙВ</h1>
    <p>Выбери тест и докажи свой уровень 🔥</p>
  </div>

  <div id="testButtonsContainer" class="tests-container">
    <div class="loading" style="text-align: center; width: 100%;">🌀 Загрузка...</div>
  </div>

  <div class="footer-btn">
    <button onclick="sendSuggestion()" class="suggestion-btn">💡 ПРЕДЛОЖЕНИЯ ИЛИ ОШИБКИ</button>
  </div>
</div>

<div id="adminModal" class="admin-modal" onclick="if(event.target===this) closeAdminModal()">
  <div class="admin-modal-content">
    <h2 class="text-2xl font-bold mb-4 neon-glow">🔐 ДОСТУП В АДМИНКУ</h2>
    <input type="password" id="adminPassword" placeholder="Введите пароль">
    <button onclick="checkPassword()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 py-3 rounded-full font-bold">ВОЙТИ</button>
    <div id="adminError" class="text-red-500 text-sm mt-3"></div>
  </div>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCuOIt7wMUrN8vu9RQqivNj9w3CdFitrqE",
  authDomain: "moscow-live-tests.firebaseapp.com",
  projectId: "moscow-live-tests",
  storageBucket: "moscow-live-tests.firebasestorage.app",
  messagingSenderId: "956332293918",
  appId: "1:956332293918:web:e7f66986cca2a30474130f"
};

const ADMIN_PASSWORD = "1495";

// 🎯 DISCORD WEBHOOK — предложения
const DISCORD_SUGGESTIONS = "https://discord.com/api/webhooks/1500489792159354900/temeK7DdbRTfd88JBRD_2vLM8QpDRpUMl4CBsyyfrVbw3fJ64znRfr52nZ4iZNEN-7Ks";

let db = null;

function initFirebase() { if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG); db = firebase.database(); }
async function loadVisibility() {
  try { 
    const s = await db.ref('settings/testVisibility').once('value'); 
    if(s.exists()) renderTests(s.val()); 
    else renderTests({ ppo: true, ustav: true, leadership: true }); 
  } catch(e){ renderTests({ ppo: true, ustav: true, leadership: true }); }
  db.ref('settings/testVisibility').on('value', (s) => { if(s.exists()) renderTests(s.val()); });
}

function renderTests(vis) {
  const container = document.getElementById('testButtonsContainer');
  if(!container) return;
  container.innerHTML = '';
  
  const tests = [
    { id: 'ustav', name: '📜 УСТАВ', desc: 'Проверь знание устава организации', color: 'cyan', url: 'ustav.html', icon: '📜' },
    { id: 'ppo', name: '📋 ППО', desc: 'Правила публикации объявлений', color: 'pink', url: 'ppo.html', icon: '📋' },
    { id: 'leadership', name: '👔 РУКОВОДСТВО', desc: 'Кто есть кто в руководстве', color: 'green', url: 'leadership.html', icon: '👔' }
  ];
  
  let visibleCards = [];
  tests.forEach(test => {
    if(vis[test.id]) {
      const card = document.createElement('div');
      card.className = `test-card ${test.color === 'pink' ? 'pink' : (test.color === 'green' ? 'green' : '')}`;
      card.onclick = () => window.location.href = test.url;
      card.innerHTML = `
        <div class="test-icon">${test.icon}</div>
        <div class="test-title ${test.color === 'pink' ? 'neon-glow' : (test.color === 'green' ? 'neon-glow' : 'neon-glow')}">${test.name}</div>
        <div class="test-desc">${test.desc}</div>
      `;
      visibleCards.push(card);
    }
  });
  
  if(visibleCards.length === 0) {
    container.innerHTML = '<div class="text-center text-gray-400" style="width: 100%; padding: 40px;">⚠️ Все тесты скрыты. Зайдите в админку.</div>';
    return;
  }
  
  visibleCards.forEach(card => container.appendChild(card));
}

function onAdminIconClick() { document.getElementById('adminModal').classList.add('active'); }
function checkPassword() { 
  if(document.getElementById('adminPassword').value === ADMIN_PASSWORD) { window.location.href = 'admin.html'; } 
  else { document.getElementById('adminError').textContent = "Неверный пароль!"; } 
}
function closeAdminModal() { document.getElementById('adminModal').classList.remove('active'); document.getElementById('adminPassword').value = ''; document.getElementById('adminError').textContent = ''; }

// Отправка предложений в Discord
async function sendSuggestion() {
  const suggestion = prompt("Ваше предложение или описание ошибки:");
  if (!suggestion) return;
  
  try {
    await fetch(DISCORD_SUGGESTIONS, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        content: `💡 **Новое предложение**\n📝 ${suggestion}\n🕐 ${new Date().toLocaleString()}`,
        username: "Москва Лайв"
      })
    });
    alert("✅ Спасибо! Предложение отправлено.");
  } catch(e) {
    alert("❌ Ошибка отправки");
  }
}

initFirebase();
loadVisibility();
</script>
</body>
</html>
