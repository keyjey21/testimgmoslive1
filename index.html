<!DOCTYPE html>
<html lang="ru" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>МОСКВА ЛАЙВ — Тест</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <style>
    /* Модальное окно для админ-панели */
    .admin-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .admin-modal.active {
      display: flex;
    }
    .admin-modal-content {
      background: var(--bg-color, #d9e8ff);
      border-radius: 16px;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 35px rgba(0,0,0,0.3);
    }
    html.dark .admin-modal-content {
      background: #1f2937;
      color: white;
    }
    .admin-modal-content input {
      width: 100%;
      padding: 10px;
      margin: 15px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    .admin-modal-content button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
    }
    .admin-modal-content button:hover {
      background: #1d4ed8;
    }
    .error-msg {
      color: #ef4444;
      font-size: 14px;
      margin-top: 10px;
    }
    .logo-clickable {
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .logo-clickable:active {
      transform: scale(0.98);
    }
  </style>
  <script>
    let clickCount = 0;
    let clickTimer = null;

    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.contains('dark');
      html.classList.toggle('dark');
      html.classList.toggle('light');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      const themeIcon = document.getElementById('theme-icon');
      if (themeIcon) themeIcon.textContent = isDark ? '🌙' : '☀️';
    }

    (function() {
      const savedTheme = localStorage.getItem('theme');
      const html = document.documentElement;
      if (savedTheme === 'dark') {
        html.classList.add('dark');
        html.classList.remove('light');
        const themeIcon = document.getElementById('theme-icon');
        if (themeIcon) themeIcon.textContent = '☀️';
      } else {
        html.classList.add('light');
        html.classList.remove('dark');
        const themeIcon = document.getElementById('theme-icon');
        if (themeIcon) themeIcon.textContent = '🌙';
      }
    })();

    // Тройное нажатие на логотип
    function onLogoClick() {
      clickCount++;
      if (clickTimer) clearTimeout(clickTimer);
      clickTimer = setTimeout(() => { clickCount = 0; }, 800);
      if (clickCount === 3) {
        clickCount = 0;
        document.getElementById('adminModal').classList.add('active');
      }
    }

    // Проверка пароля и переход в админку
    const ADMIN_PASSWORD = "admin2024";
    function checkAdminPassword() {
      const password = document.getElementById('adminPassword').value;
      if (password === ADMIN_PASSWORD) {
        window.location.href = "admin.html";
      } else {
        document.getElementById('adminError').textContent = "Неверный пароль!";
      }
    }

    function closeAdminModal() {
      document.getElementById('adminModal').classList.remove('active');
      document.getElementById('adminPassword').value = '';
      document.getElementById('adminError').textContent = '';
    }

    // Закрыть по Esc
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeAdminModal();
      }
    });

    async function sendSuggestion() {
      const suggestion = prompt("Пожалуйста, введите ваше предложение или опишите ошибку:");
      if (!suggestion) return;
      alert("Спасибо за ваше предложение!");
      // Отправка в Telegram ОТКЛЮЧЕНА
    }
  </script>
</head>
<body class="transition-all">

  <div class="absolute top-4 right-4">
    <button onclick="toggleTheme()" class="text-2xl" title="Сменить тему" id="theme-icon">🌙</button>
  </div>

  <div class="min-h-screen flex flex-col items-center justify-center p-6">
    <img src="logo.png" alt="Логотип Москва ЛАЙВ" class="w-48 mb-6 drop-shadow-lg rounded-xl logo-clickable" onclick="onLogoClick()" title="Нажмите 3 раза для входа в админ-панель">
    <h1 class="text-4xl font-bold text-center mb-2">Тест МОСКВА ЛАЙВ</h1>
    <p class="text-center text-lg mb-6">Выберите один из тестов ниже, чтобы начать</p>

    <div class="flex flex-col gap-4 w-full max-w-sm space-y-4">
      <a href="ustav.html" class="bg-blue-600 text-white py-3 rounded-xl text-center font-semibold shadow hover:bg-blue-700 transition">Тест по Уставу</a>
      <a href="ppo.html" class="bg-purple-600 text-white py-3 rounded-xl text-center font-semibold shadow hover:bg-purple-700 transition">Тест по ППО</a>
      <a href="leadership.html" class="bg-green-600 text-white py-3 rounded-xl text-center font-semibold shadow hover:bg-green-700 transition">Тест по Руководству</a>
      <button onclick="sendSuggestion()" class="bg-orange-600 text-white py-3 rounded-xl text-center font-semibold shadow hover:bg-orange-700 transition">Предложения или ошибки</button>
    </div>
  </div>

  <!-- Модальное окно входа в админку -->
  <div id="adminModal" class="admin-modal" onclick="if(event.target===this) closeAdminModal()">
    <div class="admin-modal-content">
      <h2 class="text-xl font-bold mb-4">🔐 Вход в админ-панель</h2>
      <input type="password" id="adminPassword" placeholder="Введите пароль" autocomplete="off">
      <button onclick="checkAdminPassword()">Войти</button>
      <button onclick="closeAdminModal()" style="background:#6b7280; margin-left:10px;">Отмена</button>
      <div id="adminError" class="error-msg"></div>
    </div>
  </div>

</body>
</html>
