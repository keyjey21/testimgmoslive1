<!DOCTYPE html>
<html lang="ru" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ-панель | Москва ЛАЙВ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="styles.css" rel="stylesheet" />
  <style>
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #10b981;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }
    .toast.error { background: #ef4444; }
    .toast.warning { background: #f59e0b; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    input:checked + .toggle-slider {
      background-color: #22c55e;
    }
    input:checked + .toggle-slider:before {
      transform: translateX(26px);
    }
    .sync-status {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 20px;
      text-align: center;
      margin-top: 8px;
    }
    .sync-status.success { background: #22c55e20; color: #22c55e; }
    .sync-status.error { background: #ef444420; color: #ef4444; }
    .sync-status.syncing { background: #f59e0b20; color: #f59e0b; }
    .settings-panel {
      background: #1f2937;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }
  </style>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      html.classList.toggle('dark');
      html.classList.toggle('light');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      const icon = document.getElementById('theme-icon');
      if (icon) icon.textContent = html.classList.contains('dark') ? '☀️' : '🌙';
    }
    (function() {
      const saved = localStorage.getItem('theme');
      const html = document.documentElement;
      if (saved === 'dark') { html.classList.add('dark'); html.classList.remove('light'); }
      else { html.classList.add('light'); html.classList.remove('dark'); }
      const icon = document.getElementById('theme-icon');
      if (icon) icon.textContent = saved === 'dark' ? '☀️' : '🌙';
    })();
    
    function showToast(msg, isError = false, isWarning = false) {
      const toast = document.createElement('div');
      if (isError) toast.className = 'toast error';
      else if (isWarning) toast.className = 'toast warning';
      else toast.className = 'toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  </script>
</head>
<body class="transition-all">
  <div class="flex max-w-6xl mx-auto bg-white dark:bg-gray-800 p-6 rounded-xl shadow space-x-6 text-black dark:text-white min-h-[600px]">
    <aside class="w-52 bg-gray-100 dark:bg-gray-900 rounded-lg p-4 flex flex-col space-y-3">
      <h1 class="text-xl font-bold text-orange-400 text-center mb-2">🔐 Админ-панель</h1>
      
      <!-- Настройки Gist -->
      <div class="settings-panel">
        <p class="text-sm font-semibold mb-2 text-center text-white">☁️ Облачная синхронизация</p>
        <input type="text" id="gistId" placeholder="Gist ID (https://gist.github.com/.../ЭТОТ_ID)" class="w-full p-1 text-xs bg-gray-700 text-white rounded mb-2" />
        <input type="text" id="githubToken" placeholder="GitHub Token (создать в настройках)" class="w-full p-1 text-xs bg-gray-700 text-white rounded mb-2" />
        <button onclick="saveGistSettings()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs py-1 rounded mb-1">💾 Сохранить настройки</button>
        <button onclick="syncToGist()" class="w-full bg-green-600 hover:bg-green-700 text-white text-xs py-1 rounded">☁️ Синхронизировать</button>
        <div id="syncStatus" class="sync-status text-center text-xs mt-2"></div>
      </div>
      
      <!-- Переключатели видимости тестов -->
      <div class="border-t border-b border-gray-600 py-3 my-2">
        <p class="text-sm font-semibold mb-2 text-center">👁️ Видимость тестов</p>
        <div class="flex justify-between items-center mb-2">
          <span class="text-sm">📋 ППО</span>
          <label class="toggle-switch">
            <input type="checkbox" id="togglePpo" onchange="toggleTestVisibility('ppo', this.checked)">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="flex justify-between items-center mb-2">
          <span class="text-sm">📜 Устав</span>
          <label class="toggle-switch">
            <input type="checkbox" id="toggleUstav" onchange="toggleTestVisibility('ustav', this.checked)">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-sm">👔 Руководство</span>
          <label class="toggle-switch">
            <input type="checkbox" id="toggleLeadership" onchange="toggleTestVisibility('leadership', this.checked)">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      
      <button onclick="switchSet('ppoQuestions')" id="btn-ppoQuestions" class="px-3 py-2 rounded text-white bg-blue-500 hover:bg-blue-600 text-sm">📋 PPO Выбор</button>
      <button onclick="switchSet('ppoWrittenQuestions')" id="btn-ppoWrittenQuestions" class="px-3 py-2 rounded text-white bg-green-500 hover:bg-green-600 text-sm">✍️ PPO Письменные</button>
      <button onclick="switchSet('ustavQuestions')" id="btn-ustavQuestions" class="px-3 py-2 rounded text-white bg-purple-500 hover:bg-purple-600 text-sm">📜 Устав</button>
      <hr class="my-2 border-gray-600">
      <button onclick="exportData()" class="px-3 py-2 rounded text-white bg-yellow-600 hover:bg-yellow-700 text-sm">💾 Экспорт</button>
      <label class="px-3 py-2 rounded text-white bg-gray-600 hover:bg-gray-700 text-sm text-center cursor-pointer">
        📂 Импорт
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
      </label>
      <button onclick="resetToDefault()" class="px-3 py-2 rounded text-white bg-red-600 hover:bg-red-700 text-sm">🔄 Сбросить</button>
      <input id="pw" type="password" placeholder="Пароль" class="mt-auto p-2 bg-gray-200 dark:bg-gray-700 rounded text-center text-sm" />
      <button onclick="toggleTheme()" class="mt-2 text-2xl self-center" id="theme-icon">🌙</button>
    </aside>
    <main class="flex-1 bg-gray-50 dark:bg-gray-900 rounded-lg p-6 flex flex-col">
      <div id="panel" class="hidden flex flex-col space-y-4">
        <div class="flex gap-2">
          <select id="type" onchange="toggleType()" class="p-2 bg-gray-200 dark:bg-gray-700 rounded flex-1">
            <option value="multiple">Выбор ответа</option>
            <option value="written">Письменный ответ</option>
          </select>
          <button onclick="clearForm()" class="bg-gray-500 hover:bg-gray-600 text-white px-3 rounded text-sm">🗑 Очистить</button>
        </div>
        <textarea id="q" placeholder="Вопрос" rows="2" class="p-2 bg-gray-200 dark:bg-gray-700 rounded"></textarea>
        <div id="optionFields" class="flex flex-col space-y-2">
          <input id="a1" placeholder="Вариант 1" class="p-2 bg-gray-200 dark:bg-gray-700 rounded" />
          <input id="a2" placeholder="Вариант 2" class="p-2 bg-gray-200 dark:bg-gray-700 rounded" />
          <input id="a3" placeholder="Вариант 3" class="p-2 bg-gray-200 dark:bg-gray-700 rounded" />
        </div>
        <input id="correct" placeholder="Правильный ответ" class="p-2 bg-gray-200 dark:bg-gray-700 rounded" />
        <button id="addBtn" onclick="addQuestion()" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded text-white w-32">➕ Добавить</button>
        
        <div class="flex justify-between items-center mt-4">
          <h2 class="font-bold">Список вопросов</h2>
          <span id="questionCount" class="text-sm text-gray-500"></span>
        </div>
        <div id="list" class="max-h-[400px] overflow-y-auto text-sm space-y-2 pr-1"></div>
      </div>
    </main>
  </div>

<script>
const PASSWORD = "admin2024";
let currentSet = "ppoQuestions";
let questions = [];
let editingIndex = -1;

// ========== Gist настройки ==========
function getGistSettings() {
  return {
    gistId: localStorage.getItem('gist_id') || '',
    token: localStorage.getItem('github_token') || ''
  };
}

function saveGistSettings() {
  const gistId = document.getElementById('gistId').value.trim();
  const token = document.getElementById('githubToken').value.trim();
  if (gistId && token) {
    localStorage.setItem('gist_id', gistId);
    localStorage.setItem('github_token', token);
    showToast('✅ Настройки Gist сохранены');
  } else {
    showToast('❌ Введите Gist ID и Token', true);
  }
}

function updateSyncStatus(message, type = 'syncing') {
  const statusDiv = document.getElementById('syncStatus');
  statusDiv.className = `sync-status ${type}`;
  statusDiv.textContent = message;
  setTimeout(() => {
    if (statusDiv.textContent === message) {
      statusDiv.className = 'sync-status';
      statusDiv.textContent = '';
    }
  }, 3000);
}

async function syncToGist() {
  const { gistId, token } = getGistSettings();
  if (!gistId || !token) {
    showToast('❌ Сначала настройте Gist ID и Token', true);
    return;
  }
  
  updateSyncStatus('Синхронизация...', 'syncing');
  
  const visibility = loadTestVisibility();
  const settings = {
    testVisibility: visibility,
    lastUpdated: new Date().toISOString()
  };
  
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(settings, null, 2))));
  
  try {
    // Сначала получаем текущий gist, чтобы узнать sha
    let sha = null;
    try {
      const getResponse = await fetch(`https://api.github.com/gists/${gistId}`, {
        headers: { 'Authorization': `token ${token}` }
      });
      if (getResponse.ok) {
        const data = await getResponse.json();
        sha = data.files['settings.json']?.sha;
      }
    } catch(e) { /* gist может быть новым */ }
    
    const response = await fetch(`https://api.github.com/gists/${gistId}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `token ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        files: {
          'settings.json': {
            content: JSON.stringify(settings, null, 2)
          }
        }
      })
    });
    
    if (response.ok) {
      updateSyncStatus('✅ Синхронизировано!', 'success');
      showToast('☁️ Настройки сохранены в облако');
    } else {
      const error = await response.json();
      throw new Error(error.message);
    }
  } catch(error) {
    console.error(error);
    updateSyncStatus('❌ Ошибка синхронизации', 'error');
    showToast('❌ Ошибка: ' + error.message, true);
  }
}

async function loadFromGist() {
  const { gistId, token } = getGistSettings();
  if (!gistId || !token) {
    console.log('Нет настроек Gist');
    return false;
  }
  
  try {
    const response = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    
    if (!response.ok) throw new Error('Gist не найден');
    
    const data = await response.json();
    const content = data.files['settings.json']?.content;
    if (content) {
      const settings = JSON.parse(content);
      if (settings.testVisibility) {
        localStorage.setItem('testVisibility', JSON.stringify(settings.testVisibility));
        updateToggleButtons();
        return true;
      }
    }
  } catch(error) {
    console.log('Не удалось загрузить из Gist:', error);
  }
  return false;
}
// ======================================

function loadTestVisibility() {
  const saved = localStorage.getItem('testVisibility');
  const defaults = { ppo: true, ustav: true, leadership: true };
  if (saved) {
    return { ...defaults, ...JSON.parse(saved) };
  }
  return defaults;
}

function saveTestVisibility(settings) {
  localStorage.setItem('testVisibility', JSON.stringify(settings));
  // Автоматически синхронизируем при каждом изменении
  syncToGist();
}

function toggleTestVisibility(test, isVisible) {
  const settings = loadTestVisibility();
  settings[test] = isVisible;
  saveTestVisibility(settings);
  showToast(`${getTestName(test)} ${isVisible ? 'показан' : 'скрыт'}`);
  // Сохраняем в облако автоматически
  syncToGist();
}

function getTestName(test) {
  const names = { ppo: 'Тест ППО', ustav: 'Тест Устава', leadership: 'Тест Руководства' };
  return names[test];
}

function updateToggleButtons() {
  const settings = loadTestVisibility();
  const ppoToggle = document.getElementById('togglePpo');
  const ustavToggle = document.getElementById('toggleUstav');
  const leadershipToggle = document.getElementById('toggleLeadership');
  if (ppoToggle) ppoToggle.checked = settings.ppo;
  if (ustavToggle) ustavToggle.checked = settings.ustav;
  if (leadershipToggle) leadershipToggle.checked = settings.leadership;
}

const DEFAULTS = {
  ppoQuestions: [
    { q: "Как правильно начать объявление?", options: ["а) \"продам машину\"", "б) \"Продам а/м\"", "в) \"ПРОДАМ ТАЧКУ\""], answer: "б) \"Продам а/м\"" },
    { q: "Можно ли писать цену как «5кк»?", options: ["а) Да", "б) Нет"], answer: "б) Нет" },
    { q: "Обязательно ли указывать «Цена:» для продажи?", options: ["а) Да", "б) Нет"], answer: "а) Да" },
    { q: "Как обозначить авто с полным тюнингом?", options: ["а) FT", "б) ET"], answer: "а) FT" }
  ],
  ppoWrittenQuestions: [
    { q: "Продам а/м бмв м3", answer: "Не корректное объявление." },
    { q: "Куплю Майб Г цена договорная", answer: "Не корректное объявление." },
    { q: "куплю саблю", answer: "Куплю клад \"Сабля\". Бюджет: Свободный." }
  ],
  ustavQuestions: [
    { q: "Кто имеет право вносить изменения в Устав?", options: ["А) Любой сотрудник", "Б) Только Директор", "В) Отдел Кадров"], answer: "Б" },
    { q: "Какие территории закрыты для гражданских?", options: ["А) Кабинет Директора", "Б) Второй, третий этаж и крыша", "В) Весь офис"], answer: "Б" }
  ]
};

function initSets() {
  Object.keys(DEFAULTS).forEach(key => {
    if (!localStorage.getItem(key)) {
      localStorage.setItem(key, JSON.stringify(DEFAULTS[key]));
    }
  });
  if (!localStorage.getItem('testVisibility')) {
    localStorage.setItem('testVisibility', JSON.stringify({ ppo: true, ustav: true, leadership: true }));
  }
  updateToggleButtons();
  
  // Загружаем сохранённые настройки Gist
  const savedGistId = localStorage.getItem('gist_id');
  const savedToken = localStorage.getItem('github_token');
  if (savedGistId) document.getElementById('gistId').value = savedGistId;
  if (savedToken) document.getElementById('githubToken').value = savedToken;
  
  // Пытаемся загрузить настройки из Gist при старте
  loadFromGist();
}

function loadQuestions() {
  questions = JSON.parse(localStorage.getItem(currentSet) || "[]");
  document.getElementById('questionCount').innerText = `${questions.length} вопросов`;
  renderList();
}

function saveQuestions() {
  localStorage.setItem(currentSet, JSON.stringify(questions));
  loadQuestions();
  showToast(`✅ Сохранено ${questions.length} вопросов`);
}

function renderList() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  if (!questions.length) {
    list.innerHTML = "<div class='text-center text-gray-500 p-4'>Нет вопросов. Добавьте первый!</div>";
    return;
  }
  questions.forEach((item, i) => {
    const el = document.createElement("div");
    el.className = "bg-gray-100 dark:bg-gray-800 p-2 rounded mb-2";
    const preview = item.q.length > 60 ? item.q.substring(0, 60) + "..." : item.q;
    el.innerHTML = `
      <div class="flex justify-between items-start">
        <div class="flex-1">
          <b>${i+1}.</b> ${preview}
          <div class="text-xs text-gray-500">${item.options ? "📌 Выбор ответа" : "✍️ Письменный"}</div>
        </div>
        <div class="flex gap-1">
          <button onclick="editQuestion(${i})" class="text-blue-500 text-sm px-2">✏️</button>
          <button onclick="del(${i})" class="text-red-500 text-sm px-2">🗑️</button>
        </div>
      </div>
    `;
    list.appendChild(el);
  });
}

function addQuestion() {
  const type = document.getElementById("type").value;
  const q = document.getElementById("q").value.trim();
  const correct = document.getElementById("correct").value.trim();
  if (!q) { showToast("Введите вопрос!", true); return; }
  if (!correct) { showToast("Введите правильный ответ!", true); return; }
  
  let questionObj;
  if (type === "multiple") {
    const a1 = document.getElementById("a1").value.trim();
    const a2 = document.getElementById("a2").value.trim();
    const a3 = document.getElementById("a3").value.trim();
    if (!a1 || !a2 || !a3) { showToast("Заполните все варианты!", true); return; }
    questionObj = { q, options: [a1, a2, a3], answer: correct };
  } else {
    questionObj = { q, answer: correct };
  }
  
  if (editingIndex >= 0) {
    questions[editingIndex] = questionObj;
    editingIndex = -1;
    document.getElementById("addBtn").textContent = "➕ Добавить";
    showToast("✅ Вопрос обновлён");
  } else {
    questions.push(questionObj);
    showToast("✅ Вопрос добавлен");
  }
  saveQuestions();
  clearForm();
}

function clearForm() {
  document.getElementById("q").value = "";
  document.getElementById("a1").value = "";
  document.getElementById("a2").value = "";
  document.getElementById("a3").value = "";
  document.getElementById("correct").value = "";
  document.getElementById("type").value = "multiple";
  toggleType();
  editingIndex = -1;
  document.getElementById("addBtn").textContent = "➕ Добавить";
}

function editQuestion(i) {
  const q = questions[i];
  document.getElementById("q").value = q.q;
  document.getElementById("correct").value = q.answer;
  if (q.options) {
    document.getElementById("type").value = "multiple";
    toggleType();
    document.getElementById("a1").value = q.options[0] || "";
    document.getElementById("a2").value = q.options[1] || "";
    document.getElementById("a3").value = q.options[2] || "";
  } else {
    document.getElementById("type").value = "written";
    toggleType();
  }
  editingIndex = i;
  document.getElementById("addBtn").textContent = "📝 Обновить";
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function del(i) {
  if (confirm("Удалить вопрос?")) {
    questions.splice(i, 1);
    saveQuestions();
    showToast("🗑️ Вопрос удалён");
  }
}

function toggleType() {
  const type = document.getElementById("type").value;
  document.getElementById("optionFields").style.display = type === "multiple" ? "flex" : "none";
}

function switchSet(set) {
  currentSet = set;
  loadQuestions();
  clearForm();
  ['ppoQuestions', 'ppoWrittenQuestions', 'ustavQuestions'].forEach(id => {
    const btn = document.getElementById(`btn-${id}`);
    if (btn) {
      if (id === set) btn.classList.add('ring', 'ring-offset-2', 'ring-orange-400');
      else btn.classList.remove('ring', 'ring-offset-2', 'ring-orange-400');
    }
  });
}

function exportData() {
  const data = {};
  Object.keys(DEFAULTS).forEach(key => {
    data[key] = JSON.parse(localStorage.getItem(key) || "[]");
  });
  data.testVisibility = loadTestVisibility();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `questions_backup_${new Date().toISOString().slice(0,19)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast("💾 Экспорт выполнен");
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      Object.keys(data).forEach(key => {
        if (DEFAULTS[key]) localStorage.setItem(key, JSON.stringify(data[key]));
      });
      if (data.testVisibility) {
        localStorage.setItem('testVisibility', JSON.stringify(data.testVisibility));
        updateToggleButtons();
      }
      loadQuestions();
      showToast("📂 Импорт выполнен успешно");
    } catch (err) {
      showToast("Ошибка импорта: неверный формат", true);
    }
  };
  reader.readAsText(file);
  input.value = "";
}

function resetToDefault() {
  if (confirm(`Сбросить все вопросы "${currentSet}" к стандартным?`)) {
    localStorage.setItem(currentSet, JSON.stringify(DEFAULTS[currentSet]));
    loadQuestions();
    showToast("🔄 Вопросы сброшены");
  }
}

document.getElementById("pw").addEventListener("change", function(e) {
  if (e.target.value === PASSWORD) {
    document.getElementById("panel").classList.remove("hidden");
    initSets();
    switchSet("ppoQuestions");
    showToast("🔓 Добро пожаловать в админ-панель");
  } else {
    showToast("❌ Неверный пароль", true);
  }
});

initSets();
</script>
</body>
</html>
