  <script src="https://cdn.tailwindcss.com"></script>
  <link href="styles.css" rel="stylesheet" />
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.contains('dark');
      html.classList.toggle('dark');
      html.classList.toggle('light');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      const themeIcon = document.getElementById('theme-icon');
      if (themeIcon) themeIcon.textContent = isDark ? '☀️' : '🌙';
    }

    (function() {
      const savedTheme = localStorage.getItem('theme');
      const html = document.documentElement;
      if (savedTheme === 'dark') {
        html.classList.add('dark');
        html.classList.remove('light');
        const themeIcon = document.getElementById('theme-icon');
        if (themeIcon) themeIcon.textContent = '☀️';
      } else {
        html.classList.add('light');
        html.classList.remove('dark');
        const themeIcon = document.getElementById('theme-icon');
        if (themeIcon) themeIcon.textContent = '🌙';
      }
    })();
  </script>
</head>

const defaults = {
  "ppoQuestions": defaultPpoQuestions,
  "ppoWrittenQuestions": defaultPpoWrittenQuestions,
  "ustavQuestions": defaultUstavQuestions
};

let currentSet = "ppoQuestions";
let questions = [];
let editingIndex = -1;

function initSets() {
  Object.keys(defaults).forEach(key => {
    const stored = localStorage.getItem(key);
    if (!stored || JSON.parse(stored).length === 0) {
      localStorage.setItem(key, JSON.stringify(defaults[key]));
    }
  });
}

function loadQuestions() {
  questions = JSON.parse(localStorage.getItem(currentSet) || "[]");
  renderList();
}

document.getElementById("pw").addEventListener("change", function() {
  if (this.value === PASSWORD) {
    document.getElementById("panel").classList.remove("hidden");
    initSets();
    loadQuestions();
    updateActiveTab();
  }
});

function switchSet(set) {
  currentSet = set;
  initSets();
  loadQuestions();
  updateActiveTab();
  clearForm();
}

function updateActiveTab() {
  ['ppoQuestions', 'ppoWrittenQuestions', 'ustavQuestions'].forEach(id => {
    const btn = document.getElementById(`btn-${id}`);
    if (btn) {
      if (id === currentSet) {
        btn.classList.add('ring', 'ring-offset-2', 'ring-orange-400');
      } else {
        btn.classList.remove('ring', 'ring-offset-2', 'ring-orange-400');
      }
    }
  });
}

function toggleType() {
  const type = document.getElementById("type").value;
  const optionFields = document.getElementById("optionFields");
  if (type === "written") {
    optionFields.style.display = "none";
  } else {
    optionFields.style.display = "flex";
  }
}

function addQuestion() {
  const type = document.getElementById("type").value;
  const q = document.getElementById("q").value.trim();
  const correct = document.getElementById("correct").value.trim();
  
  if (!q) {
    alert("Введите вопрос!");
    return;
  }
  if (!correct) {
    alert("Введите правильный ответ!");
    return;
  }
  
  let questionObj;
  if (type === "multiple") {
    const a1 = document.getElementById("a1").value.trim();
    const a2 = document.getElementById("a2").value.trim();
    const a3 = document.getElementById("a3").value.trim();
    if (!a1 || !a2 || !a3) {
      alert("Заполните все варианты ответов");
      return;
    }
    questionObj = { q, options: [a1, a2, a3], answer: correct };
  } else {
    questionObj = { q, answer: correct };
  }
  
  if (editingIndex >= 0) {
    questions[editingIndex] = questionObj;
    editingIndex = -1;
    document.getElementById("addBtn").textContent = "➕ Добавить";
  } else {
    questions.push(questionObj);
  }
  
  localStorage.setItem(currentSet, JSON.stringify(questions));
  renderList();
  clearForm();
}

function clearForm() {
  document.getElementById("q").value = "";
  document.getElementById("a1").value = "";
  document.getElementById("a2").value = "";
  document.getElementById("a3").value = "";
  document.getElementById("correct").value = "";
  document.getElementById("type").value = "multiple";
  toggleType();
  editingIndex = -1;
  document.getElementById("addBtn").textContent = "➕ Добавить";
}

function editQuestion(i) {
  const q = questions[i];
  document.getElementById("q").value = q.q;
  document.getElementById("correct").value = q.answer;
  if (q.options) {
    document.getElementById("type").value = "multiple";
    toggleType();
    document.getElementById("a1").value = q.options[0] || "";
    document.getElementById("a2").value = q.options[1] || "";
    document.getElementById("a3").value = q.options[2] || "";
  } else {
    document.getElementById("type").value = "written";
    toggleType();
  }
  editingIndex = i;
  document.getElementById("addBtn").textContent = "📝 Обновить";
}

function renderList() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  if (!questions || questions.length === 0) {
    list.innerHTML = "<li class='text-gray-500 text-center p-4'>Вопросы отсутствуют</li>";
    return;
  }
  questions.forEach((item, i) => {
    const el = document.createElement("li");
    el.className = "bg-gray-100 dark:bg-gray-700 p-2 rounded mb-2";
    const answerText = item.answer ? item.answer.substring(0, 50) + (item.answer.length > 50 ? "..." : "") : "Нет ответа";
    el.innerHTML = `<b>${i + 1}. ${item.q.substring(0, 80)}${item.q.length > 80 ? "..." : ""}</b><br><span class="text-xs text-gray-500">Ответ: ${answerText}</span>
      <div class="mt-1">
        <button onclick="editQuestion(${i})" class="text-blue-500 underline mr-2 text-sm">✏ Редактировать</button>
        <button onclick="del(${i})" class="text-red-500 underline text-sm">🗑 Удалить</button>
      </div>`;
    list.appendChild(el);
  });
}

function del(i) {
  if (confirm("Удалить этот вопрос?")) {
    questions.splice(i, 1);
    localStorage.setItem(currentSet, JSON.stringify(questions));
    renderList();
  }
}

// Инициализация при загрузке
initSets();
</script>
</body>
</html>
