<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тест Руководства | Москва ЛАЙВ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: radial-gradient(ellipse at 20% 30%, #0a0a2a, #050510); min-height: 100vh; color: #fff; }
    .neon-glow { text-shadow: 0 0 5px #00ff88, 0 0 10px #00ff88, 0 0 20px #00ff88; }
    .btn-neon {
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #00ff88;
      color: #00ff88;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    .btn-neon:hover { background: #00ff88; color: #050510; box-shadow: 0 0 30px #00ff88; transform: scale(1.02); }
    .glass-card { background: rgba(20, 20, 50, 0.4); backdrop-filter: blur(12px); border-radius: 24px; border: 1px solid rgba(0, 255, 136, 0.3); padding: 24px; }
    .question-block { background: rgba(20, 20, 50, 0.6); border-radius: 20px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #00ff88; }
    .timer-box { font-size: 32px; font-weight: bold; text-align: center; padding: 16px; background: rgba(0,0,0,0.5); border-radius: 60px; margin-bottom: 24px; border: 1px solid #00ff88; color: #00ff88; }
    .result { text-align: center; padding: 20px; border-radius: 20px; margin-top: 20px; font-weight: bold; }
    .correct { background: rgba(0, 255, 136, 0.2); color: #00ff88; border: 1px solid #00ff88; }
    .wrong { background: rgba(255, 0, 212, 0.2); color: #ff00d4; border: 1px solid #ff00d4; }
    .hidden { display: none; }
    .drag-container { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
    .draggable-item { background: rgba(0, 255, 136, 0.2); border: 1px solid #00ff88; border-radius: 60px; padding: 10px 20px; cursor: grab; text-align: center; backdrop-filter: blur(5px); }
    .drop-target { background: rgba(0, 0, 0, 0.4); border: 2px dashed #00ff88; border-radius: 60px; padding: 10px 20px; text-align: center; min-width: 200px; }
    .drop-target.correct { background: rgba(0, 255, 136, 0.3); border: 2px solid #00ff88; }
    .drop-target.incorrect { background: rgba(255, 0, 212, 0.3); border: 2px solid #ff00d4; }
  </style>
</head>
<body>

<div class="glass-card max-w-4xl mx-auto mt-12 p-6">
  <div class="text-center mb-6">
    <h1 class="text-4xl font-extrabold neon-glow">👔 ТЕСТ РУКОВОДСТВА</h1>
    <p class="text-gray-400 mt-2">Сопоставьте должности и сотрудников</p>
  </div>

  <div id="step1">
    <input type="text" id="username" placeholder="Имя и фамилия" class="w-full p-3 rounded-xl bg-black/50 border border-green-500 text-white text-center mb-4">
    <button class="btn-neon w-full" id="startBtn">▶ НАЧАТЬ ТЕСТ</button>
  </div>

  <div id="step2" class="hidden">
    <div class="timer-box" id="timerDisplay">15:00</div>
    <div id="gameContainer"></div>
    <button class="btn-neon w-full mt-6" id="checkBtn">✅ ПРОВЕРИТЬ ОТВЕТЫ</button>
    <div id="resultArea"></div>
  </div>
</div>

<script>
const TELEGRAM_TOKEN = "7611996960:AAH7uARRG4FS8aM0M5xcK25PMagBOvnSjbQ";
const TELEGRAM_CHAT_ID = "5755169925";
const OTHER_CHATS = ["1360982536", "5329733389", "1880536475", "1302624133", "5337802253", "902249172", "8038255042"];

const ROLES = [
  "Председатель-Правительства", "Заместитель-Председателя-Правительства 1",
  "Министр социальной политики", "Директор Москва-LIVE"
];
const NAMES = [
  { name: "Виктор Ваффентрагер", role: "Председатель-Правительства" },
  { name: "Даниил Гранде", role: "Заместитель-Председателя-Правительства 1" },
  { name: "Рамзан Непупсиков", role: "Министр социальной политики" },
  { name: "Данил Валерьянов", role: "Директор Москва-LIVE" }
];

let timerInterval = null, timeLeft = 900, testActive = false, userMatches = {};

function shuffle(arr) { for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

function startTest() {
  const username = document.getElementById('username').value.trim();
  if(!username) { alert('Введите имя!'); return; }
  testActive = true;
  timeLeft = 900;
  userMatches = {};
  renderGame();
  startTimer();
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
}

function renderGame() {
  const container = document.getElementById('gameContainer');
  container.innerHTML = `
    <div class="mb-6">
      <h2 class="text-xl font-bold mb-3">📌 Должности</h2>
      <div id="rolesContainer" class="drag-container">${shuffle([...ROLES]).map(role => `<div class="draggable-item" draggable="true" data-role="${role}">${role}</div>`).join('')}</div>
    </div>
    <div>
      <h2 class="text-xl font-bold mb-3">👤 Сотрудники</h2>
      <div id="namesContainer" class="drag-container">${NAMES.map((n, i) => `<div class="drop-target" data-expected="${n.role}" data-name="${n.name}" id="drop-${i}">${n.name}</div>`).join('')}</div>
    </div>
  `;
  initDragAndDrop();
}

function initDragAndDrop() {
  let dragged = null;
  document.querySelectorAll('.draggable-item').forEach(el => {
    el.setAttribute('draggable', 'true');
    el.ondragstart = (e) => { dragged = el; e.dataTransfer.setData('text/plain', ''); };
    el.ondragend = () => { dragged = null; };
  });
  document.querySelectorAll('.drop-target').forEach(target => {
    target.ondragover = (e) => e.preventDefault();
    target.ondrop = (e) => {
      e.preventDefault();
      if(!dragged) return;
      const role = dragged.getAttribute('data-role');
      const targetId = target.id;
      const expectedRole = target.getAttribute('data-expected');
      const name = target.getAttribute('data-name');
      userMatches[name] = role;
      target.innerHTML = `${name}<br><span class="text-xs">→ ${role}</span>`;
      dragged.remove();
      showToast(`📌 ${name} → ${role}`);
    };
  });
}

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    if(!testActive) return;
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft <= 0) { clearInterval(timerInterval); alert('Время вышло!'); checkAnswers(); }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

function checkAnswers() {
  if(!testActive) return;
  testActive = false;
  clearInterval(timerInterval);
  const username = document.getElementById('username').value.trim();
  let correctCount = 0;
  NAMES.forEach(n => {
    const matched = userMatches[n.name];
    const isCorrect = (matched === n.role);
    if(isCorrect) correctCount++;
    const target = document.getElementById(`drop-${NAMES.findIndex(x=>x.name===n.name)}`);
    if(target) target.classList.add(isCorrect ? 'correct' : 'incorrect');
  });
  const total = NAMES.length;
  const pass = Math.floor(total * 0.7);
  const resultDiv = document.getElementById('resultArea');
  resultDiv.innerHTML = `<div class="result ${correctCount >= pass ? 'correct' : 'wrong'}">📊 Результат: ${correctCount} / ${total}<br>${correctCount >= pass ? '✅ СДАЛ! Молодец!' : '❌ НЕ СДАЛ! Иди учить руководство!'}</div>`;
  sendToTelegram(`📝 <b>Тест Руководства</b>\n👤 ${username}\n📊 ${correctCount}/${total}\n${correctCount >= pass ? "✅ СДАЛ" : "❌ НЕ СДАЛ"}`);
}

async function sendToTelegram(msg) {
  const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
  try {
    await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg, parse_mode: "HTML" }) });
    for(let id of OTHER_CHATS) fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ chat_id: id, text: msg, parse_mode: "HTML" }) });
  } catch(e) {}
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'fixed bottom-5 right-5 bg-green-500 text-black px-4 py-2 rounded-full z-50 animate-pulse';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

document.getElementById('startBtn').onclick = startTest;
document.getElementById('checkBtn').onclick = checkAnswers;
</script>
</body>
</html>
