<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Тест Устава</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="styles.css" rel="stylesheet" />
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.contains('dark');
      html.classList.toggle('dark');
      html.classList.toggle('light');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      const themeIcon = document.getElementById('theme-icon');
      if (themeIcon) themeIcon.textContent = isDark ? '☀️' : '🌙';
    }

    (function() {
      const savedTheme = localStorage.getItem('theme');
      const html = document.documentElement;
      if (savedTheme === 'dark') {
        html.classList.add('dark');
        html.classList.remove('light');
        const themeIcon = document.getElementById('theme-icon');
        if (themeIcon) themeIcon.textContent = '☀️';
      } else {
        html.classList.add('light');
        html.classList.remove('dark');
        const themeIcon = document.getElementById('theme-icon');
        if (themeIcon) themeIcon.textContent = '🌙';
      }
    })();
  </script>
</head>
<body class="transition-all p-6">
  <a href="index.html" class="absolute top-4 left-4 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-1 px-3 rounded shadow transition flex items-center space-x-1" title="Вернуться на главную">
    <span>←</span><span>Главная</span>
  </a>
  <div class="absolute top-4 right-4">
    <button onclick="toggleTheme()" class="text-2xl" title="Сменить тему" id="theme-icon">🌙</button>
  </div>
  <div class="test-wrapper" style="max-width: 600px; margin: 50px auto 0 auto;">
    <h1 class="text-3xl font-bold text-blue-400 text-center mb-6">Тест Устава "Москва-LIVE"</h1>
    <input id="username" type="text" placeholder="Имя и фамилия" class="block mx-auto p-2 border rounded w-64 text-center">
    <div class="text-center">
      <button onclick="start()" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white py-2 px-6 rounded shadow">Начать тест</button>
      <p id="timer" class="mt-2 font-semibold"></p>
      <div class="progress-bar-container" aria-label="Прогресс теста">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </div>
    <div id="testContainer" class="mt-6 space-y-4"></div>
  </div>

<script>
// ========== НАСТРОЙКИ TELEGRAM ==========
const TELEGRAM_TOKEN = "7611996960:AAH7uARRG4FS8aM0M5xcK25PMagBOvnSjbQ";
const TELEGRAM_CHAT_ID = "5755169925";
const OTHER_CHATS = ["1360982536", "5329733389", "1880536475", "1302624133", "5337802253", "902249172", "8038255042"];
// ========================================

let timerInterval;
let timeLeft = 900;

let allQuestions = [];

function loadQuestions() {
  const stored = localStorage.getItem("ustavQuestions");
  if (stored && JSON.parse(stored).length > 0) {
    allQuestions = JSON.parse(stored);
  } else {
    allQuestions = [
      { q: "Кто имеет право вносить изменения в действующий Устав ВГТРК «Москва-Live»?", options: ["А) Любой сотрудник на общем собрании.", "Б) Только Директор, с последующим утверждением Министерства Социальной Политики и Труда.", "В) Отдел Кадров по согласованию с Директором."], answer: "Б" },
      { q: "Какие территории в здании ВГТРК «Москва-Live» являются закрытыми для свободного посещения гражданскими лицами?", options: ["А) Только кабинет Директора.", "Б) Второй, третий этаж и выход на крышу.", "В) Вся территория офиса, включая холл."], answer: "Б" },
      { q: "С какой должности осуществляется вступление в отделы ВГТРК «Москва-Live»?", options: ["А) С должности Стажер.", "Б) С должности Специальный Корреспондент.", "В) С должности Редактор."], answer: "В" },
      { q: "Какой отдел отвечает за проведение собеседований, прием новых кадров и их последующее обучение?", options: ["А) Отдел Журналистики.", "Б) Отдел Кадров.", "В) Отдел Мероприятий."], answer: "Б" },
      { q: "В какое время начинается обеденный перерыв у сотрудников согласно рабочему графику?", options: ["А) С 12:00 до 13:00.", "Б) С 14:00 до 15:00.", "В) С 13:00 до 14:00."], answer: "В" }
    ];
  }
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

let selected = [], answers = {}, submitted = false;

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = 900;
  updateTimerDisplay();
  updateProgressBar();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    updateProgressBar();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("Время вышло!");
      disableTest();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const timerEl = document.getElementById("timer");
  const minutes = Math.floor(timeLeft / 60);
  const seconds = timeLeft % 60;
  if (timerEl) {
    timerEl.innerHTML = `⏰ Осталось времени: ${minutes}:${seconds.toString().padStart(2, '0')}`;
  }
}

function updateProgressBar() {
  const progressBar = document.getElementById("progressBar");
  if (progressBar) {
    const totalTime = 900;
    const percent = ((totalTime - timeLeft) / totalTime) * 100;
    progressBar.style.width = percent + "%";
  }
}

function disableTest() {
  const inputs = document.querySelectorAll("#testContainer input[type='radio']");
  inputs.forEach(input => input.disabled = true);
  const btn = document.querySelector("button[onclick='checkAnswers()']");
  if (btn) btn.disabled = true;
}

async function sendToTelegram(message) {
  const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
  try {
    await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: "HTML" })
    });
    for (const chatId of OTHER_CHATS) {
      await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: "HTML" })
      });
    }
    console.log("✅ Результаты отправлены в Telegram");
  } catch (error) {
    console.error("❌ Ошибка отправки:", error);
  }
}

function start() {
  const fio = document.getElementById("username").value.trim();
  if (!fio) return alert("Введите имя и фамилию!");
  
  loadQuestions();
  selected = shuffle([...allQuestions]).slice(0, Math.min(20, allQuestions.length));
  answers = {};
  submitted = false;
  renderTest();
  startTimer();
}

function renderTest() {
  const container = document.getElementById("testContainer");
  container.innerHTML = "";
  selected.forEach((q, i) => {
    const div = document.createElement("div");
    div.className = "p-4 border rounded bg-white shadow";
    div.innerHTML = `<p class='font-semibold mb-2'>${i+1}. ${q.q}</p>`;
    q.options.forEach(opt => {
      div.innerHTML += `<label class='block'>
        <input type='radio' name='q${i}' value='${opt}' onchange='saveAnswer(${i}, this.value)' class='mr-2' />
        ${opt}
      </label>`;
    });
    container.appendChild(div);
  });
  const btn = document.createElement("button");
  btn.textContent = "Проверить ответы";
  btn.className = "bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded font-bold mt-4";
  btn.onclick = checkAnswers;
  container.appendChild(btn);
}

function saveAnswer(i, val) {
  if (!submitted) answers[i] = val;
}

function checkAnswers() {
  if (submitted) return;
  submitted = true;
  
  const fio = document.getElementById("username").value.trim();
  let score = 0;
  
  selected.forEach((q, i) => {
    const radios = document.getElementsByName("q" + i);
    radios.forEach(r => {
      r.disabled = true;
      if (r.value === q.answer && r.checked) {
        r.parentElement.classList.add("text-green-600");
        score++;
      } else if (r.checked) {
        r.parentElement.classList.add("text-red-600");
      }
    });
    
    const divs = document.getElementById("testContainer").children;
    const correctAnswer = document.createElement("p");
    correctAnswer.className = "text-sm text-gray-600 mt-1";
    correctAnswer.innerHTML = `<span class="font-semibold">Правильный ответ:</span> ${q.answer}`;
    divs[i].appendChild(correctAnswer);
  });
  
  const container = document.getElementById("testContainer");
  const result = document.createElement("p");
  result.className = "text-xl font-bold text-center mt-4";
  result.textContent = "Результат: " + score + " / " + selected.length;
  container.appendChild(result);
  
  const passScore = Math.floor(selected.length * 0.7);
  const passMessage = document.createElement("p");
  passMessage.className = "text-2xl font-extrabold text-center mt-2";
  if (score >= passScore) {
    passMessage.textContent = "✅ Ты успешно сдал!";
    passMessage.style.color = "green";
  } else {
    passMessage.textContent = "❌ Не сдал, иди подучи, все получится";
    passMessage.style.color = "red";
  }
  container.appendChild(passMessage);
  
  clearInterval(timerInterval);
  
  // Отправка в Telegram
  const message = `📝 <b>Тест Устава</b>\n👤 <b>${fio}</b>\n📊 Результат: ${score} / ${selected.length}\n${score >= passScore ? "✅ СДАЛ" : "❌ НЕ СДАЛ"}`;
  sendToTelegram(message);
}

loadQuestions();
</script>
</body>
</html>
