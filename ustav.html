<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тест Устава</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    body { background: #f0f2f5; font-family: sans-serif; }
    .test-card { max-width: 700px; margin: 40px auto; background: white; border-radius: 24px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .question-block { background: #f8fafc; border-radius: 16px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #3b82f6; }
    .timer-box { font-size: 28px; font-weight: bold; text-align: center; padding: 12px; background: #1e293b; color: white; border-radius: 16px; margin-bottom: 24px; }
    .btn-start { background: #22c55e; color: white; padding: 12px 32px; border-radius: 40px; font-weight: bold; border: none; cursor: pointer; font-size: 18px; width: 100%; }
    .btn-check { background: #3b82f6; color: white; padding: 12px 24px; border-radius: 40px; font-weight: bold; border: none; cursor: pointer; width: 100%; font-size: 18px; margin-top: 20px; }
    .result { text-align: center; padding: 16px; border-radius: 16px; margin-top: 20px; font-weight: bold; }
    .correct { background: #dcfce7; color: #166534; }
    .wrong { background: #fee2e2; color: #991b1b; }
    .answer-hint { margin-top: 12px; padding-top: 8px; border-top: 1px solid #e2e8f0; font-size: 14px; }
    .hidden { display: none; }
    textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 8px; margin-top: 8px; }
  </style>
</head>
<body>

<div class="test-card" id="app">
  <h1 class="text-2xl font-bold text-center mb-4">📜 Тест по Уставу</h1>
  
  <div id="step1">
    <input type="text" id="username" placeholder="Имя и фамилия" class="w-full p-3 border rounded-xl mb-4 text-center">
    <button class="btn-start" id="startBtn">▶ НАЧАТЬ ТЕСТ</button>
  </div>
  
  <div id="step2" class="hidden">
    <div class="timer-box" id="timerDisplay">15:00</div>
    <div id="questionsList"></div>
    <button class="btn-check" id="checkBtn">✅ ПРОВЕРИТЬ ОТВЕТЫ</button>
    <div id="resultArea"></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCuOIt7wMUrN8vu9RQqivNj9w3CdFitrqE",
  authDomain: "moscow-live-tests.firebaseapp.com",
  projectId: "moscow-live-tests",
  storageBucket: "moscow-live-tests.firebasestorage.app",
  messagingSenderId: "956332293918",
  appId: "1:956332293918:web:e7f66986cca2a30474130f"
};

const TELEGRAM_TOKEN = "7611996960:AAH7uARRG4FS8aM0M5xcK25PMagBOvnSjbQ";
const TELEGRAM_CHAT_ID = "5755169925";
const OTHER_CHATS = ["1360982536", "5329733389", "1880536475", "1302624133", "5337802253", "902249172", "8038255042"];

let db = null;
let allQuestions = [];
let selectedQuestions = [];
let userAnswers = {};
let timerInterval = null;
let timeLeft = 900;
let testActive = false;

firebase.initializeApp(firebaseConfig);
db = firebase.database();

async function loadQuestions() {
  const snapshot = await db.ref('questions/ustavQuestions').once('value');
  const data = snapshot.val();
  if (data && Array.isArray(data)) {
    // Поддерживаем оба типа: с options (выбор ответа) и без options (письменные)
    allQuestions = data.filter(q => q.inTest !== false);
  } else {
    allQuestions = [];
  }
  console.log('Загружено вопросов:', allQuestions.length);
  return allQuestions.length;
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

async function startTest() {
  const username = document.getElementById('username').value.trim();
  if (!username) {
    alert('Введите имя и фамилию!');
    return;
  }
  
  const count = await loadQuestions();
  if (count === 0) {
    alert('Нет вопросов для теста!');
    return;
  }
  
  selectedQuestions = shuffleArray([...allQuestions]);
  userAnswers = {};
  testActive = true;
  timeLeft = 900;
  
  renderQuestions();
  startTimer();
  
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
}

function renderQuestions() {
  const container = document.getElementById('questionsList');
  container.innerHTML = '';
  
  for (let i = 0; i < selectedQuestions.length; i++) {
    const q = selectedQuestions[i];
    const block = document.createElement('div');
    block.className = 'question-block';
    block.id = `q-${i}`;
    
    let innerHtml = `<div class="font-bold text-lg mb-3">${i+1}. ${escapeHtml(q.q)}</div>`;
    
    if (q.options && Array.isArray(q.options)) {
      // Вопрос с вариантами ответа
      innerHtml += q.options.map(opt => `
        <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-100 cursor-pointer">
          <input type="radio" name="q${i}" value="${escapeHtml(opt)}" class="w-4 h-4">
          <span>${escapeHtml(opt)}</span>
        </label>
      `).join('');
    } else {
      // Письменный вопрос
      innerHtml += `<textarea name="q${i}" rows="3" class="w-full p-2 border rounded-lg mt-2" placeholder="Введите ответ..."></textarea>`;
    }
    
    innerHtml += `<div class="answer-hint hidden" id="hint-${i}"></div>`;
    block.innerHTML = innerHtml;
    container.appendChild(block);
  }
}

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    if (!testActive) return;
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert('Время вышло!');
      checkAnswers();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const minutes = Math.floor(timeLeft / 60);
  const seconds = timeLeft % 60;
  document.getElementById('timerDisplay').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
}

function checkAnswers() {
  if (!testActive) return;
  testActive = false;
  clearInterval(timerInterval);
  
  const username = document.getElementById('username').value.trim();
  
  // Собираем ответы
  for (let i = 0; i < selectedQuestions.length; i++) {
    const q = selectedQuestions[i];
    if (q.options && Array.isArray(q.options)) {
      const radios = document.getElementsByName(`q${i}`);
      for (let r of radios) {
        if (r.checked) {
          userAnswers[i] = r.value;
          break;
        }
      }
    } else {
      const textarea = document.querySelector(`textarea[name="q${i}"]`);
      if (textarea) {
        userAnswers[i] = textarea.value;
      }
    }
  }
  
  let correctCount = 0;
  for (let i = 0; i < selectedQuestions.length; i++) {
    const q = selectedQuestions[i];
    const userAnswer = userAnswers[i] || '';
    let isCorrect = false;
    
    if (q.options && Array.isArray(q.options)) {
      isCorrect = (userAnswer === q.answer);
    } else {
      isCorrect = userAnswer.trim().toLowerCase() === (q.answer || '').trim().toLowerCase();
    }
    
    if (isCorrect) correctCount++;
    
    const hintDiv = document.getElementById(`hint-${i}`);
    if (hintDiv) {
      hintDiv.classList.remove('hidden');
      hintDiv.innerHTML = `${isCorrect ? '✅' : '❌'} Правильный ответ: ${escapeHtml(q.answer)}`;
      hintDiv.style.color = isCorrect ? '#166534' : '#991b1b';
    }
    
    // Блокируем все инпуты
    const radios = document.getElementsByName(`q${i}`);
    radios.forEach(r => r.disabled = true);
    const textarea = document.querySelector(`textarea[name="q${i}"]`);
    if (textarea) textarea.disabled = true;
  }
  
  const passScore = Math.floor(selectedQuestions.length * 0.7);
  const resultDiv = document.getElementById('resultArea');
  resultDiv.innerHTML = `
    <div class="result ${correctCount >= passScore ? 'correct' : 'wrong'}">
      📊 Результат: ${correctCount} / ${selectedQuestions.length}<br>
      ${correctCount >= passScore ? '✅ СДАЛ! Молодец!' : '❌ НЕ СДАЛ! Иди учить устав!'}
    </div>
  `;
  
  sendToTelegram(`📝 <b>Тест Устава</b>\n👤 ${username}\n📊 ${correctCount}/${selectedQuestions.length}\n${correctCount >= passScore ? "✅ СДАЛ" : "❌ НЕ СДАЛ"}`);
}

async function sendToTelegram(message) {
  const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
  try {
    await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: "HTML" })
    });
    for (const id of OTHER_CHATS) {
      await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: id, text: message, parse_mode: "HTML" })
      });
    }
  } catch(e) { console.error(e); }
}

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

document.getElementById('startBtn').onclick = startTest;
document.getElementById('checkBtn').onclick = checkAnswers;
</script>
</body>
</html>
