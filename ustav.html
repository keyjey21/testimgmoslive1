<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест Устава | Москва ЛАЙВ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 20% 30%, #0a0a2a, #050510);
      min-height: 100vh;
      color: #fff;
    }
    .neon-glow { text-shadow: 0 0 5px #00d4ff, 0 0 10px #00d4ff, 0 0 20px #00d4ff; }
    .btn-neon {
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid #00d4ff;
      color: #00d4ff;
      padding: 14px 28px;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      font-size: 16px;
    }
    .btn-neon:hover {
      background: #00d4ff;
      color: #050510;
      box-shadow: 0 0 30px #00d4ff;
      transform: scale(1.02);
    }
    .btn-neon-green {
      border-color: #00ff88;
      color: #00ff88;
    }
    .btn-neon-green:hover {
      background: #00ff88;
      box-shadow: 0 0 30px #00ff88;
    }
    .btn-neon-blue {
      border-color: #00d4ff;
      color: #00d4ff;
    }
    .btn-neon-blue:hover {
      background: #00d4ff;
      box-shadow: 0 0 30px #00d4ff;
    }
    .btn-home {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.3s ease;
      z-index: 100;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-home:hover {
      background: #00d4ff;
      border-color: #00d4ff;
      color: #050510;
      transform: scale(1.02);
    }
    .glass-card {
      background: rgba(15, 25, 45, 0.6);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      border: 1px solid rgba(0, 212, 255, 0.3);
      padding: 32px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .question-block {
      background: rgba(10, 15, 30, 0.7);
      border-radius: 24px;
      padding: 24px;
      border-left: 4px solid #00d4ff;
    }
    .timer-box {
      font-size: 36px;
      font-weight: 800;
      text-align: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 60px;
      margin-bottom: 24px;
      border: 1px solid #00d4ff;
      color: #00d4ff;
      letter-spacing: 2px;
    }
    .result {
      text-align: center;
      padding: 20px;
      border-radius: 20px;
      margin-top: 20px;
      font-weight: bold;
    }
    .result-success {
      background: rgba(0, 255, 136, 0.15);
      color: #00ff88;
      border: 1px solid #00ff88;
    }
    .result-fail {
      background: rgba(255, 0, 212, 0.15);
      color: #ff00d4;
      border: 1px solid #ff00d4;
    }
    input[type="radio"] {
      accent-color: #00d4ff;
      width: 18px;
      height: 18px;
      margin-right: 12px;
    }
    .hidden { display: none; }
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 24px;
    }
    .nav-buttons button {
      flex: 1;
    }
    .question-counter {
      text-align: center;
      margin-bottom: 16px;
      font-size: 14px;
      color: #aaa;
      letter-spacing: 1px;
    }
    .radio-label {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      margin: 6px 0;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .radio-label:hover {
      background: rgba(0, 212, 255, 0.1);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeInUp 0.4s ease-out;
    }
    .error-message {
      background: rgba(255, 0, 0, 0.2);
      border: 1px solid #ff4444;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
      color: #ff8888;
      text-align: center;
    }
  </style>
</head>
<body>

<a href="index.html" class="btn-home">
  🏠 НА ГЛАВНУЮ
</a>

<div class="glass-card max-w-2xl mx-auto mt-12 p-6">
  <div class="text-center mb-6">
    <h1 class="text-5xl font-extrabold neon-glow mb-2">📜 ТЕСТ УСТАВА</h1>
    <p class="text-gray-300 mt-1">Проверь знание устава организации</p>
  </div>

  <div id="step1" class="animate-in">
    <input type="text" id="username" placeholder="Введите ваше имя и фамилию" class="w-full p-4 rounded-xl bg-black/40 border-2 border-cyan-500 text-white text-center text-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition">
    <button class="btn-neon w-full mt-6" id="startBtn">▶ СТАРТ ТЕСТА</button>
  </div>

  <div id="step2" class="hidden animate-in">
    <div class="timer-box" id="timerDisplay">15:00</div>
    <div class="question-counter" id="questionCounter">Вопрос 1 из 0</div>
    <div id="currentQuestion"></div>
    <div class="nav-buttons">
      <button id="prevBtn" class="btn-neon btn-neon-blue" disabled>◀ НАЗАД</button>
      <button id="nextBtn" class="btn-neon btn-neon-blue">ДАЛЕЕ ▶</button>
    </div>
    <button class="btn-neon btn-neon-green w-full mt-6" id="checkBtn">✅ ЗАВЕРШИТЬ ТЕСТ</button>
    <div id="resultArea"></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCuOIt7wMUrN8vu9RQqivNj9w3CdFitrqE",
  authDomain: "moscow-live-tests.firebaseapp.com",
  projectId: "moscow-live-tests",
  storageBucket: "moscow-live-tests.firebasestorage.app",
  messagingSenderId: "956332293918",
  appId: "1:956332293918:web:e7f66986cca2a30474130f"
};

// 🎯 DISCORD WEBHOOK — результаты тестов
const DISCORD_RESULTS = "https://discord.com/api/webhooks/1500489572025372842/IGJtGda4K64g0comJ-PbOo04fiAVNTfFmD_sZSNk8W0fqbPsgsV0s7yhO-3kMQ-67urU";

let db = null, allQuestions = [], selected = [], userAnswers = {}, timerInterval = null, timeLeft = 900, testActive = false;
let currentQuestionIndex = 0;

window.addEventListener('beforeunload', function(e) {
  if (testActive) {
    e.preventDefault();
    e.returnValue = '⚠️ Вы не завершили тест! Точно хотите уйти?';
    return e.returnValue;
  }
});

firebase.initializeApp(firebaseConfig);
db = firebase.database();

async function loadQuestions() {
  console.log("🔍 Загрузка вопросов из Firebase...");
  try {
    const snapshot = await db.ref('questions/ustavQuestions').once('value');
    console.log("📦 ustavQuestions:", snapshot.exists() ? snapshot.val() : "null");
    
    let questions = snapshot.exists() ? snapshot.val() : [];
    if (!Array.isArray(questions)) questions = [];
    
    console.log(`📋 Загружено вопросов: ${questions.length}`);
    
    // Фильтруем только вопросы с inTest !== false
    allQuestions = questions.filter(q => q && q.inTest !== false);
    console.log(`✅ Итого вопросов для теста: ${allQuestions.length}`);
    return allQuestions.length;
  } catch(e) {
    console.error("❌ Ошибка загрузки вопросов:", e);
    return 0;
  }
}

function shuffle(arr) { 
  if (!arr || !arr.length) return [];
  for(let i = arr.length - 1; i > 0; i--) { 
    let j = Math.floor(Math.random() * (i + 1)); 
    [arr[i], arr[j]] = [arr[j], arr[i]]; 
  } 
  return arr; 
}

async function sendToDiscord(username, score, total, passed, testName) {
  const color = passed ? 0x00ff88 : 0xff00d4;
  const status = passed ? "✅ СДАЛ" : "❌ НЕ СДАЛ";
  const percent = Math.round(score / total * 100);
  
  try {
    await fetch(DISCORD_RESULTS, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        embeds: [{
          title: `📊 Результат теста ${testName}`,
          description: `**${username}** ${status}`,
          color: color,
          fields: [
            { name: "📝 Правильных ответов", value: `${score}/${total}`, inline: true },
            { name: "📈 Процент", value: `${percent}%`, inline: true },
            { name: "🎯 Проходной балл", value: `${Math.floor(total * 0.7)} правильных`, inline: true },
            { name: "📅 Дата", value: new Date().toLocaleString(), inline: false }
          ],
          footer: { text: "Москва Лайв | Система тестирования" }
        }]
      })
    });
  } catch(e) {
    console.error("Discord send error:", e);
  }
}

async function startTest() {
  const username = document.getElementById('username').value.trim();
  if(!username) { 
    alert('❌ Пожалуйста, введите ваше имя и фамилию!'); 
    return; 
  }
  
  // Показываем загрузку
  const startBtn = document.getElementById('startBtn');
  startBtn.textContent = "⏳ ЗАГРУЗКА...";
  startBtn.disabled = true;
  
  const cnt = await loadQuestions();
  
  startBtn.textContent = "▶ СТАРТ ТЕСТА";
  startBtn.disabled = false;
  
  if(cnt === 0) { 
    alert('❌ Нет вопросов для теста!\n\nПроверьте:\n1. В админ-панели добавлены вопросы\n2. У вопросов стоит галочка "в тест"');
    return; 
  }
  
  selected = shuffle([...allQuestions]);
  userAnswers = {};
  testActive = true;
  timeLeft = 900;
  currentQuestionIndex = 0;
  renderCurrentQuestion();
  startTimer();
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
}

function renderCurrentQuestion() {
  const container = document.getElementById('currentQuestion');
  const counter = document.getElementById('questionCounter');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  
  if (!selected.length) {
    container.innerHTML = '<div class="error-message">❌ Ошибка: нет вопросов для отображения</div>';
    return;
  }
  
  counter.innerHTML = `📌 Вопрос ${currentQuestionIndex + 1} из ${selected.length}`;
  prevBtn.disabled = (currentQuestionIndex === 0);
  nextBtn.textContent = (currentQuestionIndex === selected.length - 1) ? '🏁 ПОСЛЕДНИЙ ▶' : '➡ ДАЛЕЕ';
  
  const q = selected[currentQuestionIndex];
  if (!q) {
    container.innerHTML = '<div class="error-message">❌ Ошибка: вопрос не найден</div>';
    return;
  }
  
  const savedAnswer = userAnswers[currentQuestionIndex] || '';
  
  let inner = `<div class="question-block" id="q-${currentQuestionIndex}">
    <div class="font-bold text-xl mb-4">${currentQuestionIndex + 1}. ${escapeHtml(q.q)}</div>`;
  
  if(q.options && q.options.length) {
    inner += `<div class="space-y-2 mt-2">`;
    q.options.forEach(opt => {
      inner += `
        <label class="radio-label">
          <input type="radio" name="currentQ" value="${escapeHtml(opt)}" ${savedAnswer === opt ? 'checked' : ''}>
          <span class="flex-1">${escapeHtml(opt)}</span>
        </label>
      `;
    });
    inner += `</div>`;
  } else {
    inner += `<textarea name="currentQ" rows="3" placeholder="✏️ Введите ответ..." class="w-full p-3 rounded-xl bg-black/40 border border-cyan-500 focus:ring-2 focus:ring-cyan-500">${escapeHtml(savedAnswer)}</textarea>`;
  }
  
  inner += `<div class="answer-hint hidden mt-3 pt-2 border-t border-cyan-500/30 text-sm" id="hint-${currentQuestionIndex}"></div></div>`;
  container.innerHTML = inner;
  
  const radios = document.querySelectorAll('input[name="currentQ"]');
  const textarea = document.querySelector('textarea[name="currentQ"]');
  
  if(radios.length) {
    radios.forEach(r => {
      r.addEventListener('change', () => {
        userAnswers[currentQuestionIndex] = r.value;
      });
    });
  } else if(textarea) {
    textarea.addEventListener('input', () => {
      userAnswers[currentQuestionIndex] = textarea.value;
    });
  }
}

function nextQuestion() {
  if(currentQuestionIndex < selected.length - 1) {
    currentQuestionIndex++;
    renderCurrentQuestion();
  }
}

function prevQuestion() {
  if(currentQuestionIndex > 0) {
    currentQuestionIndex--;
    renderCurrentQuestion();
  }
}

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    if(!testActive) return;
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft <= 0) { 
      clearInterval(timerInterval); 
      alert('⏰ Время вышло!'); 
      checkAnswers(); 
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  document.getElementById('timerDisplay').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

async function checkAnswers() {
  if(!testActive) return;
  testActive = false;
  clearInterval(timerInterval);
  const username = document.getElementById('username').value.trim();
  
  let correctCount = 0;
  const userResults = [];
  
  for(let i = 0; i < selected.length; i++) {
    const q = selected[i];
    const userAnswer = userAnswers[i] || '';
    let isCorrect = false;
    
    if(q.options && q.options.length) {
      isCorrect = (userAnswer === q.answer);
    } else {
      const normalize = (str) => str.trim().toLowerCase().replace(/[«»"„“]/g, '"').replace(/\s+/g, ' ');
      isCorrect = normalize(userAnswer) === normalize(q.answer || '');
    }
    if(isCorrect) correctCount++;
    userResults.push({ q, userAnswer, isCorrect });
  }
  
  const container = document.getElementById('currentQuestion');
  let resultsHtml = `
    <div class="result ${correctCount >= Math.floor(selected.length * 0.7) ? 'result-success' : 'result-fail'} mb-6">
      <div class="text-2xl font-bold mb-2">📊 РЕЗУЛЬТАТ</div>
      <div class="text-4xl font-black">${correctCount} / ${selected.length}</div>
      <div class="mt-2 text-lg">${correctCount >= Math.floor(selected.length * 0.7) ? '✅ ПОЗДРАВЛЯЮ! ТЫ СДАЛ!' : '❌ К СОЖАЛЕНИЮ, ТЫ НЕ СДАЛ'}</div>
      <div class="text-sm opacity-75 mt-2">Проходной балл: ${Math.floor(selected.length * 0.7)} правильных ответов</div>
    </div>
    <div class="space-y-4" id="resultsList"></div>
  `;
  container.innerHTML = resultsHtml;
  
  const resultsList = document.getElementById('resultsList');
  for(let i = 0; i < userResults.length; i++) {
    const r = userResults[i];
    const resultDiv = document.createElement('div');
    resultDiv.className = `question-block ${r.isCorrect ? 'border-l-green-500' : 'border-l-red-500'}`;
    resultDiv.style.borderLeftColor = r.isCorrect ? '#00ff88' : '#ff00d4';
    resultDiv.innerHTML = `
      <div class="font-bold text-lg mb-2">${i+1}. ${escapeHtml(r.q.q)}</div>
      <div class="text-sm mb-1 text-gray-300">📝 Ваш ответ: ${escapeHtml(r.userAnswer) || '(не выбран)'}</div>
      <div class="text-sm ${r.isCorrect ? 'text-green-400' : 'text-red-400'}">
        ${r.isCorrect ? '✅ Верно!' : '❌ Ошибка!'} 
        <span class="text-gray-300">Правильный ответ:</span> ${escapeHtml(r.q.answer)}
      </div>
    `;
    resultsList.appendChild(resultDiv);
  }
  
  document.querySelector('.nav-buttons').style.display = 'none';
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('questionCounter').innerHTML = '🏆 РЕЗУЛЬТАТЫ ТЕСТА';
  
  const pass = Math.floor(selected.length * 0.7);
  await sendToDiscord(username, correctCount, selected.length, correctCount >= pass, "Устав");
}

function escapeHtml(t) { 
  if(!t) return ''; 
  return t.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]); 
}

document.getElementById('startBtn').onclick = startTest;
document.getElementById('nextBtn').onclick = nextQuestion;
document.getElementById('prevBtn').onclick = prevQuestion;
document.getElementById('checkBtn').onclick = checkAnswers;

// Проверка подключения к Firebase
firebase.database().ref('.info/connected').on('value', (snap) => {
  if (snap.val() === true) {
    console.log("✅ Firebase подключен");
  } else {
    console.log("❌ Firebase НЕ подключен");
  }
});
</script>
</body>
</html>
